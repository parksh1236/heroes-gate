<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영웅문: 화산논검</title>
<style>
/* ===== 전체 테마: 수묵 무협풍 ===== */
:root{
  --bg:#12100e;          /* 먹빛 배경 */
  --panel:#1e1a16;       /* 패널 배경 */
  --panel2:#2a241e;      /* 밝은 패널 */
  --ink:#e8ddc8;         /* 한지색 글자 */
  --dim:#9a8f7a;         /* 흐린 글자 */
  --red:#c0392b;         /* 주홍 (인장) */
  --gold:#d9a441;        /* 금색 */
  --geom:#6ea8dc;        /* 검(劍) 파랑 */
  --jang:#d96b5b;        /* 장(掌) 붉음 */
  --gwon:#c98f3d;        /* 권(拳) 갈색금 */
  --gi:#68c2a0;          /* 기(氣) 청록 */
  --hp:#c0392b;
  --exp:#d9a441;
}
*{box-sizing:border-box; margin:0; padding:0; user-select:none;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:"Noto Serif KR","Apple SD Gothic Neo","Nanum Myeongjo",serif;
  min-height:100vh;
  background-image:radial-gradient(ellipse at 50% 0%, #241f19 0%, #12100e 70%);
}
#app{max-width:960px; margin:0 auto; padding:16px; min-height:100vh; display:flex; flex-direction:column;}
button{
  font-family:inherit; cursor:pointer;
  background:var(--panel2); color:var(--ink);
  border:1px solid #4a4036; border-radius:6px;
  padding:10px 18px; font-size:15px;
  transition:all .15s;
}
button:hover:not(:disabled){border-color:var(--gold); color:var(--gold);}
button:disabled{opacity:.35; cursor:default;}
button.primary{background:var(--red); border-color:#e05a48; color:#fff; font-weight:bold;}
button.primary:hover:not(:disabled){background:#d64a38; color:#fff;}
h1,h2,h3{font-weight:600;}
.dim{color:var(--dim);}
.gold{color:var(--gold);}
.red{color:#e06050;}

/* ===== 타이틀 화면 ===== */
.title-screen{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; text-align:center;}
.title-main{
  font-size:72px; letter-spacing:16px; font-weight:700;
  background:linear-gradient(180deg,#f0e2c0,#c9a355);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 0 40px rgba(217,164,65,.15);
}
.title-sub{font-size:22px; color:var(--dim); letter-spacing:8px;}
.title-desc{max-width:520px; line-height:1.9; color:var(--dim); font-size:14px;}
.seal{
  display:inline-block; background:var(--red); color:#fff;
  padding:4px 10px; border-radius:4px; font-size:13px; letter-spacing:2px;
}

/* ===== 캐릭터 선택 ===== */
.char-grid{display:flex; gap:20px; justify-content:center; flex-wrap:wrap;}
.char-card{
  width:280px; background:var(--panel); border:1px solid #4a4036; border-radius:10px;
  padding:24px; cursor:pointer; transition:all .2s; text-align:left;
}
.char-card:hover{border-color:var(--gold); transform:translateY(-4px); box-shadow:0 8px 30px rgba(0,0,0,.5);}
.char-portrait{font-size:52px; text-align:center; margin-bottom:12px;}
.char-portrait svg{width:112px; height:112px;}
.char-name{font-size:24px; text-align:center; color:var(--gold);}
.char-title{font-size:13px; text-align:center; color:var(--dim); margin-bottom:14px;}
.char-stat{font-size:14px; line-height:1.9;}

/* ===== 상단 HUD ===== */
.hud{
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  background:var(--panel); border:1px solid #3a332b; border-radius:8px;
  padding:10px 16px; margin-bottom:14px; font-size:15px;
}
.hud .spacer{flex:1;}
.hpbar{width:130px; height:10px; background:#3a2020; border-radius:5px; overflow:hidden; display:inline-block; vertical-align:middle;}
.hpbar>div{height:100%; background:var(--hp); transition:width .3s;}

/* ===== 지도 화면 ===== */
.map-act-title{text-align:center; font-size:22px; color:var(--gold); margin:10px 0 4px;}
.map-act-sub{text-align:center; color:var(--dim); font-size:13px; margin-bottom:16px;}
.map-floors{display:flex; flex-direction:column-reverse; gap:10px; align-items:center;}
.map-floor{display:flex; gap:14px; align-items:center;}
.floor-num{width:36px; text-align:right; color:var(--dim); font-size:13px;}
.map-node{
  min-width:120px; padding:12px 16px; text-align:center;
  background:var(--panel); border:1px solid #3a332b; border-radius:8px; font-size:15px;
}
.map-node.avail{border-color:var(--gold); cursor:pointer; box-shadow:0 0 14px rgba(217,164,65,.12);}
.map-node.avail:hover{background:var(--panel2); transform:scale(1.05);}
.map-node.done{opacity:.3;}
.map-node.future{opacity:.55;}
.map-node .nicon{font-size:20px; display:block; margin-bottom:2px;}

/* ===== 전투 화면 ===== */
.combat{display:flex; flex-direction:column; gap:12px; flex:1;}
.enemy-zone{
  background:var(--panel); border:1px solid #3a332b; border-radius:10px;
  padding:18px 22px; display:flex; align-items:center; gap:20px;
}
.enemy-face{font-size:56px; filter:drop-shadow(0 0 12px rgba(192,57,43,.3));}
.enemy-face.hit{animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.enemy-info{flex:1;}
.enemy-name{font-size:20px; color:#e8b0a0;}
.enemy-hpbar{height:16px; background:#3a2020; border-radius:8px; overflow:hidden; margin:8px 0; position:relative;}
.enemy-hpbar>div{height:100%; background:linear-gradient(90deg,#a03025,#d05040); transition:width .3s;}
.enemy-hpbar span{position:absolute; inset:0; text-align:center; font-size:12px; line-height:16px; color:#fff; text-shadow:0 1px 2px #000;}
.intent{
  background:var(--panel2); border:1px solid #4a4036; border-radius:8px;
  padding:10px 16px; font-size:14px; text-align:center; min-width:110px;
}
.intent .big{font-size:20px; display:block;}
.score-zone{
  display:flex; align-items:center; justify-content:center; gap:14px;
  background:var(--panel); border:1px solid #3a332b; border-radius:10px; padding:12px;
  font-size:15px; min-height:64px;
}
.score-box{background:var(--panel2); border-radius:8px; padding:6px 16px; text-align:center; min-width:86px;}
.score-box .lbl{font-size:11px; color:var(--dim); display:block;}
.score-box .val{font-size:22px; font-weight:bold;}
.chips-c{color:var(--geom);}
.mult-c{color:var(--red); color:#e06050;}
.dmg-c{color:var(--gold);}
.hand-name-lbl{font-size:18px; color:var(--gold); min-width:120px; text-align:center;}
.combat-log{
  font-size:13px; color:var(--dim); text-align:center; min-height:38px; line-height:1.5;
}
.hand-zone{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; min-height:180px; align-items:flex-end; padding-top:14px;}
/* ===== 무공 카드 (슬더스 방식) ===== */
.pcard{
  width:110px; height:156px; border-radius:9px; cursor:pointer; position:relative;
  background:linear-gradient(160deg,#efe6d0,#d8ccb0);
  color:#222; border:2px solid #8a7a5c;
  display:flex; flex-direction:column; align-items:center;
  padding:8px 7px 6px; text-align:center;
  transition:all .15s; box-shadow:0 3px 8px rgba(0,0,0,.4);
}
.pcard:hover{transform:translateY(-10px) scale(1.04); box-shadow:0 8px 18px rgba(0,0,0,.5);}
/* 기력 부족 카드 */
.pcard.noenergy{filter:grayscale(.75) brightness(.75); cursor:default;}
.pcard.noenergy:hover{transform:none;}
/* 기력 비용 구슬 */
.pcard .cost{
  position:absolute; top:-8px; left:-8px; width:26px; height:26px;
  background:radial-gradient(circle at 35% 30%, #7ec8e8, #2a6099);
  border:2px solid #1a4066; border-radius:50%;
  color:#fff; font-size:14px; font-weight:bold; line-height:22px; z-index:3;
  text-shadow:0 1px 2px #000;
}
.pcard .cname{
  font-size:14px; font-weight:700; z-index:2; margin-top:2px;
  border-bottom:1px solid rgba(0,0,0,.2); padding-bottom:4px; width:100%;
}
.pcard .up-mark{color:#b8860b;}
.pcard .suit-art{flex:1; display:flex; align-items:center; justify-content:center; opacity:.30; z-index:1;}
.pcard .suit-art svg{width:44px; height:44px;}
.pcard .cdesc{font-size:11.5px; line-height:1.45; z-index:2; min-height:36px;}
.pcard .ctype{font-size:9.5px; color:#7a6a50; z-index:2; margin-top:4px;}
/* 문파 색 (윗단 띠 + 그림) */
.pcard.s-geom{border-top:5px solid var(--geom);} .pcard.s-geom .suit-art{color:#2a6099;}
.pcard.s-jang{border-top:5px solid var(--jang);} .pcard.s-jang .suit-art{color:#b04030;}
.pcard.s-gwon{border-top:5px solid var(--gwon);} .pcard.s-gwon .suit-art{color:#906020;}
.pcard.s-gi{border-top:5px solid var(--gi);} .pcard.s-gi .suit-art{color:#2a8060;}
/* 분류별 이름 색 */
.pcard.t-attack .cname{color:#8a2a20;}
.pcard.t-skill .cname{color:#1f5a48;}
.pcard.t-power .cname{color:#8a6a10;}
/* ===== 플레이어 바 (기력/방어/힘 + 턴 종료) ===== */
.player-bar{
  display:flex; align-items:center; gap:14px;
  background:var(--panel); border:1px solid #3a332b; border-radius:10px;
  padding:10px 16px;
}
.player-bar .spacer{flex:1;}
.energy-orb{
  width:54px; height:54px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #8ad4f0, #1f4f80);
  border:3px solid #d9a441;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:16px; text-shadow:0 1px 3px #000;
  box-shadow:0 0 16px rgba(126,200,232,.35);
}
.energy-orb b{font-size:22px;}
.pstat{font-size:15px;}
.st-chip{font-weight:600;}
/* ===== 나레이션 일러스트 ===== */
.story-img{
  border:1px solid #4a4036; border-radius:8px; overflow:hidden;
  background:#0a0908; display:flex; justify-content:center;
  animation:storyFade .9s forwards;
}
.story-img svg{width:100%; height:auto; display:block;}
.story-img.portrait svg{width:auto; height:170px; padding:8px 0;}
.combat-actions{display:flex; gap:12px; justify-content:center; align-items:center; padding-bottom:8px;}
.combat-sub{display:flex; gap:18px; justify-content:center; font-size:13px; color:var(--dim);}

/* ===== 보상 / 상점 / 이벤트 공용 ===== */
.center-panel{
  max-width:640px; margin:30px auto; background:var(--panel);
  border:1px solid #4a4036; border-radius:12px; padding:30px; text-align:center;
  display:flex; flex-direction:column; gap:18px;
}
.center-panel h2{color:var(--gold); font-size:26px;}
.choice-row{display:flex; gap:14px; justify-content:center; flex-wrap:wrap;}
.relic-box{
  background:var(--panel2); border:1px solid #4a4036; border-radius:10px;
  padding:16px; width:180px; cursor:pointer; transition:all .15s;
}
.relic-box:hover{border-color:var(--gold); transform:translateY(-3px);}
.relic-box .ricon{font-size:32px;}
.relic-box .rname{color:var(--gold); font-size:16px; margin:6px 0;}
.relic-box .rdesc{font-size:12px; color:var(--dim); line-height:1.6;}
.relic-box .rprice{margin-top:8px; color:var(--gold); font-weight:bold;}
.relic-box.disabled{opacity:.35; cursor:default;}
.relic-strip{display:flex; gap:6px; flex-wrap:wrap;}
.relic-chip{
  background:var(--panel2); border:1px solid #4a4036; border-radius:6px;
  padding:3px 8px; font-size:16px; cursor:help; position:relative;
}
.relic-chip:hover::after{
  content:attr(data-tip); position:absolute; bottom:110%; left:50%; transform:translateX(-50%);
  background:#000; color:var(--ink); padding:8px 12px; border-radius:6px; font-size:12px;
  white-space:nowrap; z-index:50; border:1px solid #4a4036;
}
.deck-grid{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-height:420px; overflow-y:auto; padding:12px;}
.deck-grid .pcard:hover{transform:translateY(-4px);}
.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:100;
  display:flex; align-items:center; justify-content:center;
}
.overlay .center-panel{max-width:720px; max-height:85vh; overflow-y:auto; margin:0;}
.event-art{font-size:64px;}
.event-text{line-height:1.9; color:var(--ink); font-size:15px;}
.floating-dmg{
  position:absolute; font-size:32px; font-weight:bold; color:var(--gold);
  animation:floatUp 1s forwards; pointer-events:none; text-shadow:0 2px 6px #000; z-index:20;
}
@keyframes floatUp{0%{opacity:1; transform:translateY(0)}100%{opacity:0; transform:translateY(-50px)}}

/* ===== 전투 연출(FX) ===== */
#fx{position:fixed; inset:0; pointer-events:none; z-index:200;}
/* 출수 시 카드가 위로 날아가며 사라짐 */
.pcard.fly{animation:flyOut .35s forwards; pointer-events:none;}
@keyframes flyOut{to{transform:translateY(-170px) scale(.7) rotate(-6deg); opacity:0;}}
/* 연출 중 손패 잠금 */
.hand-zone.locked{pointer-events:none; opacity:.9;}
/* 초식명 붓글씨 스플래시 */
.fx-splash{
  position:fixed; left:50%; top:36%; transform:translate(-50%,-50%);
  font-size:54px; font-weight:700; color:var(--gold); letter-spacing:10px;
  text-shadow:0 0 34px rgba(217,164,65,.55), 0 2px 4px #000;
  animation:splash .9s forwards; white-space:nowrap; text-align:center;
}
.fx-splash-sub{font-size:20px; color:var(--gi); letter-spacing:4px; margin-top:8px; text-shadow:0 2px 6px #000;}
@keyframes splash{
  0%{opacity:0; transform:translate(-50%,-50%) scale(2.4);}
  22%{opacity:1; transform:translate(-50%,-50%) scale(1);}
  72%{opacity:1;}
  100%{opacity:0; transform:translate(-50%,-62%) scale(1);}
}
/* 참격 궤적 — --rot(각도), --slashc(색) 파라미터 */
.fx-slash{position:fixed; width:160px; height:160px; z-index:205;}
.fx-slash::before{
  content:''; position:absolute; left:-15%; top:50%; width:130%; height:6px;
  background:linear-gradient(90deg,transparent,#fff,var(--slashc,#ffd27a),transparent);
  box-shadow:0 0 14px var(--slashc,#ffd27a);
  border-radius:3px;
  transform:rotate(var(--rot,-38deg));
  animation:slashSweep .34s forwards;
}
@keyframes slashSweep{
  0%{opacity:0; transform:rotate(var(--rot,-38deg)) translateX(-95px) scaleX(.3);}
  30%{opacity:1;}
  100%{opacity:0; transform:rotate(var(--rot,-38deg)) translateX(95px) scaleX(1.15);}
}
/* 파편 입자 (권/폭발) */
.fx-part{
  position:fixed; border-radius:50%; pointer-events:none; z-index:206;
  box-shadow:0 0 8px currentColor;
  animation:partFly .6s ease-out forwards;
}
@keyframes partFly{
  0%{opacity:1; transform:translate(0,0) scale(1);}
  100%{opacity:0; transform:translate(var(--dx),var(--dy)) scale(.15);}
}
/* 파동 링 (장풍/기공/음파) */
.fx-ring{
  position:fixed; width:170px; height:170px; margin-left:-85px; margin-top:-85px;
  border:4px solid; border-radius:50%; pointer-events:none; z-index:205;
  box-shadow:0 0 22px currentColor inset;
  animation:ringOut .55s ease-out forwards;
}
@keyframes ringOut{
  0%{opacity:1; transform:scale(.12);}
  100%{opacity:0; transform:scale(1.05);}
}
/* 기막(氣幕) 방어 돔 */
.fx-guard{
  position:fixed; width:140px; height:66px; pointer-events:none; z-index:205;
  border:3px solid var(--gi); border-bottom:none;
  border-radius:70px 70px 0 0;
  background:linear-gradient(180deg, rgba(104,194,160,.28), transparent);
  box-shadow:0 0 24px rgba(104,194,160,.4);
  animation:guardUp .85s ease-out forwards;
}
@keyframes guardUp{
  0%{opacity:0; transform:translateY(24px) scale(.6);}
  30%{opacity:1; transform:translateY(0) scale(1);}
  75%{opacity:1;}
  100%{opacity:0; transform:translateY(-8px) scale(1.04);}
}
.fx-guard.flash{animation:guardFlash .45s forwards;}
@keyframes guardFlash{
  0%{opacity:1; transform:scale(1); filter:brightness(2);}
  100%{opacity:0; transform:scale(1.12);}
}
/* 떠오르는 숫자 (데미지/방어) */
.fx-float{
  position:fixed; font-weight:bold; pointer-events:none; z-index:210;
  transform:translateX(-50%); text-shadow:0 2px 6px #000;
  animation:floatUp 1s forwards;
}
/* 피격 시 화면 전체 흔들림 */
.shake-app{animation:appShake .4s;}
@keyframes appShake{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(-7px,4px)} 40%{transform:translate(7px,-4px)}
  60%{transform:translate(-5px,-3px)} 80%{transform:translate(5px,3px)}
}
/* 피격 시 붉은 섬광 (화면 가장자리) */
.fx-vignette{
  position:fixed; inset:0;
  box-shadow:inset 0 0 130px 45px rgba(192,57,43,.55);
  animation:vign .45s forwards;
}
@keyframes vign{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
/* ===== 전장 (좌: 나 / 우: 적 — 슬더스식 대치) ===== */
.battlefield{
  display:flex; justify-content:space-between; align-items:flex-end;
  background:var(--panel); border:1px solid #3a332b; border-radius:10px;
  padding:16px 34px 18px; min-height:240px; overflow:hidden; position:relative;
}
/* 바닥 라인 */
.battlefield::after{
  content:''; position:absolute; left:5%; right:5%; bottom:14px;
  border-bottom:1px solid #3a332b;
}
.fighter{
  display:flex; flex-direction:column; align-items:center; gap:5px;
  width:200px; position:relative; z-index:2;
}
.fighter .fhead{font-size:16px; color:var(--ink);}
.enemy-side .fhead{color:#e8b0a0;}
.fighter .fhp{
  width:160px; height:14px; background:#3a2020; border-radius:7px;
  position:relative; overflow:hidden;
}
.fighter .fhp-fill{height:100%; background:linear-gradient(90deg,#3a8a4a,#5ab060); transition:width .3s;}
.fighter .fhp.enemy .fhp-fill{background:linear-gradient(90deg,#a03025,#d05040);}
.fighter .fhp span{
  position:absolute; inset:0; text-align:center; font-size:11px; line-height:14px;
  color:#fff; text-shadow:0 1px 2px #000;
}
.fighter .fstats{font-size:13px; min-height:19px; display:flex; gap:8px; align-items:center;}
.intent-chip{
  background:var(--panel2); border:1px solid #4a4036; border-radius:14px;
  padding:3px 14px; font-size:13px; white-space:nowrap;
}
.battle-mid{
  display:flex; flex-direction:column; align-items:center; gap:4px;
  align-self:center; color:var(--dim);
}
/* 내 캐릭터 초상 — 스프라이트 자체에 숨쉬기 프레임이 있어 부유(bob) 효과는 주지 않는다 (발이 땅에 붙어 있도록) */
.player-face svg{width:130px; height:130px; display:block;}
/* ===== 주인공 픽셀 스프라이트 (itch.io CC0 — LuizMelo Martial Hero 1·2) =====
   시트는 인물 경계로 잘라둠(여백 없음) → 요소 바닥 = 인물 발.
   표시 크기는 원본의 정확히 2배 (진우 프레임 127×73 → 254×146, 선우 116×69 → 232×138) */
.hero-sprite{
  position:relative;
  background-repeat:no-repeat; background-size:auto 100%;
  image-rendering:pixelated;
}
/* left 보정: 검 휘두름 공간 때문에 프레임이 오른쪽으로 넓음 → 인물이 열 중앙에 오도록 */
.h-jinwoo{width:254px; height:146px; left:67px;}
.h-sunwoo{width:232px; height:138px; left:60px;}
/* 진우 (Martial Hero): 대기 8프레임 / 공격 6 / 피격 4 */
.h-jinwoo.idle{background-image:url('assets/jinwoo_idle.png?v=2'); animation:sprJi .9s steps(8) infinite;}
.h-jinwoo.attack{background-image:url('assets/jinwoo_attack.png?v=2'); animation:sprJa .5s steps(6) forwards;}
.h-jinwoo.hurtanim{background-image:url('assets/jinwoo_hit.png?v=2'); animation:sprJh .4s steps(4) forwards;}
@keyframes sprJi{to{background-position-x:-2032px;}}
@keyframes sprJa{to{background-position-x:-1524px;}}
@keyframes sprJh{to{background-position-x:-1016px;}}
/* 선우 (Martial Hero 2): 대기 4 / 공격 4 / 피격 3 */
.h-sunwoo.idle{background-image:url('assets/sunwoo_idle.png?v=2'); animation:sprSi .8s steps(4) infinite;}
.h-sunwoo.attack{background-image:url('assets/sunwoo_attack.png?v=2'); animation:sprSa .45s steps(4) forwards;}
.h-sunwoo.hurtanim{background-image:url('assets/sunwoo_hit.png?v=2'); animation:sprSh .35s steps(3) forwards;}
@keyframes sprSi{to{background-position-x:-928px;}}
@keyframes sprSa{to{background-position-x:-928px;}}
@keyframes sprSh{to{background-position-x:-696px;}}
/* 캐릭터 선택 화면에서는 카드에 맞게 축소 */
.char-portrait .hero-sprite{transform:scale(.8); transform-origin:50% 100%;}
/* 픽셀 이펙트 스프라이트 (pimen VFX) */
.fx-sprite{
  position:fixed; z-index:206; pointer-events:none;
  background-repeat:no-repeat; background-size:auto 100%;
  image-rendering:pixelated;
}
@keyframes fxspr{to{background-position-x:var(--fxend);}}
/* 적은 좌우 반전으로 나를 향해 마주 봄 */
.enemy-fighter .enemy-face svg{transform:scaleX(-1);}
.fighter .enemy-face svg{width:var(--fsz,130px); height:var(--fsz,130px);}
/* 적 편성 (1~3명 가로 배치) */
.enemy-group{display:flex; gap:6px; align-items:flex-end;}
.enemy-group .fighter{width:auto; min-width:110px; cursor:pointer;}
.enemy-group .fighter .fhp{width:110px;}
/* 목표 지정된 적: 금색 조준 표시 */
.fighter.targeted .enemy-face svg{filter:drop-shadow(0 0 9px var(--gold));}
.fighter.targeted .fhead{color:var(--gold);}
.fighter.targeted::before{
  content:'▼'; position:absolute; top:-16px; left:50%; transform:translateX(-50%);
  color:var(--gold); font-size:13px; animation:bob 1.6s ease-in-out infinite;
}
/* 격파된 적 */
.fighter.dead{opacity:.22; filter:grayscale(1); cursor:default;}
.fighter.dead .enemy-face{animation:none;}
/* 돌진 (전진 후 유지) → 렌더 후 dashback으로 복귀 */
.fighter.dash{animation:dashGo .26s ease-in forwards; z-index:6;}
@keyframes dashGo{to{transform:translateX(var(--dash));}}
.fighter.dashback{animation:dashBack .32s ease-out;}
@keyframes dashBack{from{transform:translateX(var(--dash));}to{transform:translateX(0);}}
/* 기술 시전 (비공격 카드) */
.player-face.cast{animation:castPulse .5s;}
@keyframes castPulse{
  40%{filter:drop-shadow(0 0 18px rgba(104,194,160,.9)); transform:translateY(-9px);}
  100%{filter:none; transform:translateY(0);}
}
/* 내 캐릭터 피격 */
.player-face.hit{animation:shake .35s;}
/* 적 초상 SVG 크기 */
.enemy-face svg{width:118px; height:118px; display:block;}
/* 피격 시 적 초상 섬광 */
.enemy-face.hit svg{animation:eflash .4s;}
@keyframes eflash{
  25%{filter:brightness(2.4) saturate(1.6) drop-shadow(0 0 18px #ff7a5a);}
  100%{filter:none;}
}
/* 적: 평소 숨쉬기 / 공격 돌진 / 격파 */
.enemy-face{animation:bob 3.2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.enemy-face.lunge{animation:lunge .34s;}
@keyframes lunge{40%{transform:translate(-46px,28px) scale(1.12);}100%{transform:translate(0,0);}}
.enemy-face.ko{animation:koFall .65s forwards;}
@keyframes koFall{to{transform:rotate(80deg) translateY(34px); opacity:0; filter:grayscale(1);}}
/* 연계 점수 박스 강조 */
.combo-box{border:1px solid var(--gi); box-shadow:0 0 10px rgba(104,194,160,.25);}
/* 비전서 표 */
.codex table{width:100%; border-collapse:collapse; font-size:13px;}
.codex td{padding:5px 8px; border-bottom:1px solid #3a332b; text-align:left; vertical-align:top;}
.codex h3{color:var(--gold); margin:14px 0 6px; font-size:16px; text-align:left;}

/* ===== 스토리(나레이션) 화면 ===== */
.story-panel{max-width:600px; margin-top:60px; padding:40px 44px;}
.story-h{
  font-size:24px; color:var(--gold); letter-spacing:6px; margin-bottom:8px;
  border-bottom:1px solid #4a4036; padding-bottom:14px;
}
.story-body{text-align:left; min-height:180px;}
.story-p{
  font-size:15px; line-height:1.9; color:var(--ink); margin:12px 0;
  opacity:0; animation:storyFade .8s forwards;
}
@keyframes storyFade{from{opacity:0; transform:translateY(10px);}to{opacity:1; transform:translateY(0);}}
/* 대사 화자 표시 */
.who{
  color:var(--gold); font-weight:bold; margin-right:6px;
  border-left:3px solid var(--gold); padding-left:8px;
}
.who.villain{color:#e06050; border-left-color:#e06050;}
/* ===== 가이드 본문 ===== */
.guide-body{text-align:left;}
.guide-body h3{color:var(--gold); margin:16px 0 6px; font-size:16px;}
.guide-body p{font-size:14px; line-height:1.8; color:var(--ink); margin:6px 0;}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
/* ============================================================
   영웅문: 화산논검
   — 무협 로그라이크 덱빌딩 (슬레이 더 스파이어 × 발라트로)
   김용 <영웅문>(사조영웅전) 세계관 기반
   ============================================================ */

/* ===== 기본 데이터 ===== */

// 문파(무늬) 정의 — 발라트로의 카드 무늬에 해당
const SUITS = {
  geom: {key:'geom', name:'검', hanja:'劍', desc:'검법'},
  jang: {key:'jang', name:'장', hanja:'掌', desc:'장법'},
  gwon: {key:'gwon', name:'권', hanja:'拳', desc:'권법'},
  gi:   {key:'gi',   name:'기', hanja:'氣', desc:'내공 (출수 시 성수만큼 방어 획득)'},
};
const SUIT_KEYS = ['geom','jang','gwon','gi'];
const HANJA_NUM = ['','一','二','三','四','五','六','七','八','九']; // 성(星) 표기용 한자

/* ===== 문파 아이콘 SVG (카드 그림) — currentColor로 문파 색이 입혀진다 ===== */
const SUIT_ICONS = {
  // 검(劍): 곧은 검
  geom: `<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 1 L14.2 13 L12 16.2 L9.8 13 Z"/>
    <rect x="7.6" y="15.8" width="8.8" height="1.7" rx="0.85"/>
    <rect x="11.1" y="17.4" width="1.8" height="4.6" rx="0.9"/>
    <circle cx="12" cy="22.4" r="1.2"/></svg>`,
  // 장(掌): 펼친 손바닥
  jang: `<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
    <rect x="6.8" y="10.2" width="10.4" height="9.2" rx="3.4"/>
    <rect x="6.9" y="4.6" width="2.1" height="7" rx="1.05"/>
    <rect x="9.55" y="3" width="2.1" height="8.6" rx="1.05"/>
    <rect x="12.2" y="3.4" width="2.1" height="8.2" rx="1.05"/>
    <rect x="14.85" y="4.9" width="2.1" height="6.7" rx="1.05"/>
    <rect x="3.9" y="10.6" width="2.3" height="6" rx="1.15" transform="rotate(26 5.05 13.6)"/></svg>`,
  // 권(拳): 정면 주먹
  gwon: `<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
    <rect x="5" y="7.6" width="14" height="10.4" rx="4.2"/>
    <circle cx="7.6" cy="7.8" r="1.9"/><circle cx="10.6" cy="7.2" r="1.9"/>
    <circle cx="13.6" cy="7.2" r="1.9"/><circle cx="16.5" cy="7.8" r="1.9"/>
    <rect x="7.2" y="14.2" width="8.2" height="3.2" rx="1.6" opacity=".45"/>
    <rect x="8.6" y="18" width="6.8" height="3.6" rx="1.4"/></svg>`,
  // 기(氣): 소용돌이 기류
  gi: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2.6 a9.4 9.4 0 1 1 -9.4 9.4 a6.6 6.6 0 1 1 6.6 -6.6 a3.9 3.9 0 1 1 -3.9 3.9"/></svg>`,
};

/* ===== 적 초상 SVG 생성기 =====
   cfg: {robe:도포색, skin, hair:머리모양, hairColor, hoodColor, beard:수염색,
         blind:눈가리개, weapon:무기, acc:포인트색, aura:기운색(정예/보스)} */
function enemySVG(a){
  const skin = a.skin || '#e6c39a';
  const acc = a.acc || '#c0392b';
  const hairC = a.hairColor || '#26221e';
  let s = `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">`;
  // 먹빛 원 배경 + (보스/정예) 기운 테
  s += `<circle cx="60" cy="62" r="52" fill="#0a0908" opacity=".5"/>`;
  s += `<circle cx="60" cy="62" r="52" fill="none" stroke="${a.aura||'#4a4036'}" stroke-width="${a.aura?2.5:1.2}" opacity="${a.aura?'.85':'.6'}"/>`;
  if(a.aura) s += `<circle cx="60" cy="62" r="57" fill="none" stroke="${a.aura}" stroke-width="1.2" opacity=".35"/>`;
  // 왼팔 (늘어뜨림)
  s += `<path d="M43 72 Q37 84 43 95" stroke="${a.robe}" stroke-width="10" fill="none" stroke-linecap="round"/>`;
  // 몸통 도포 + 어깨 그늘 + 허리띠
  s += `<path d="M38 108 L42 66 Q60 57 78 66 L82 108 Z" fill="${a.robe}"/>`;
  s += `<path d="M42 66 Q60 57 78 66 L78 75 Q60 66 42 75 Z" fill="#000" opacity=".22"/>`;
  s += `<rect x="45" y="85" width="30" height="5" rx="2" fill="${acc}"/>`;
  // 오른팔 (무기 쪽으로 뻗음)
  s += `<path d="M77 71 Q86 78 88 91" stroke="${a.robe}" stroke-width="10" fill="none" stroke-linecap="round"/>`;
  // 무기
  const w = a.weapon;
  if(w==='dao'){ // 곡도
    s += `<path d="M87 92 Q98 70 91 44 Q101 68 95 94 Z" fill="#b9c2cc"/><rect x="84" y="90" width="10" height="4.5" rx="2" fill="${acc}"/>`;
  }else if(w==='jian'){ // 곧은 검
    s += `<rect x="86.5" y="44" width="3.4" height="46" rx="1.5" fill="#c8d0da"/><rect x="81.5" y="87" width="13" height="3.6" rx="1.8" fill="${acc}"/>`;
  }else if(w==='spear'){ // 장창
    s += `<rect x="86.8" y="28" width="2.8" height="70" rx="1.4" fill="#7a5a38"/><path d="M88.2 15 L94 30 L88.2 26 L82.4 30 Z" fill="#c8d0da"/><circle cx="88.2" cy="32" r="2.2" fill="${acc}"/>`;
  }else if(w==='daggers'){ // 쌍비수 (양손)
    s += `<path d="M88 90 L92 74 L95 90 Z" fill="#c8d0da"/><rect x="86" y="89" width="8" height="3" rx="1.5" fill="${acc}"/>`;
    s += `<path d="M40 93 L44 78 L47 93 Z" fill="#c8d0da"/><rect x="38" y="92" width="8" height="3" rx="1.5" fill="${acc}"/>`;
  }else if(w==='claw'){ // 조법 (갈고리 손톱)
    s += `<circle cx="89" cy="91" r="4.5" fill="${skin}"/>`;
    s += `<path d="M91 88 Q99 82 100 74 M92 91 Q101 88 104 82 M92 94 Q101 94 105 90" stroke="#d8dee6" stroke-width="2.4" fill="none" stroke-linecap="round"/>`;
  }else if(w==='staff'){ // 죽봉 (대나무 봉)
    s += `<rect x="86.8" y="28" width="3.2" height="70" rx="1.6" fill="#7a9a4a"/>`;
    s += `<path d="M86.8 44 h3.2 M86.8 60 h3.2 M86.8 76 h3.2" stroke="#5a7a36" stroke-width="1.6"/>`;
  }else if(w==='staffsnake'){ // 사두장 (뱀 지팡이)
    s += `<rect x="86.8" y="34" width="3.2" height="62" rx="1.6" fill="#6a5a3a"/>`;
    s += `<path d="M88.4 34 Q80 28 85 21 Q92 15 97 22 Q99 28 93 30" fill="none" stroke="#7fae6a" stroke-width="3.6" stroke-linecap="round"/><circle cx="95" cy="23" r="1.4" fill="#d94"/>`;
  }else if(w==='palm'){ // 장풍 (뻗은 손 + 파동)
    s += `<circle cx="92" cy="72" r="6" fill="${skin}"/>`;
    s += `<path d="M100 62 Q108 72 100 82 M104 58 Q114 72 104 86" stroke="${acc}" stroke-width="2.6" fill="none" stroke-linecap="round" opacity=".85"/>`;
  }else if(w==='fan'){ // 접선 (부채)
    s += `<path d="M88 90 L99 70 A15 15 0 0 0 74 72 Z" fill="#e8ddc0"/><path d="M88 90 L86 72 M88 90 L93 71 M88 90 L80 73" stroke="#b09a6a" stroke-width="1.2"/><rect x="86" y="88" width="5" height="6" rx="2" fill="${acc}"/>`;
  }
  // 긴 머리는 머리통보다 먼저 (뒤로 흘러내림)
  if(a.hair==='long') s += `<path d="M46 36 Q60 22 74 36 L79 76 L70 71 L73 45 Q60 34 47 45 L50 71 L41 76 Z" fill="${hairC}"/>`;
  if(a.hair==='wild') s += `<path d="M44 40 L38 26 L50 32 L54 20 L60 30 L66 20 L70 32 L82 26 L76 40 Z" fill="${hairC}"/><path d="M46 38 Q60 24 74 38 L76 62 L68 58 L70 45 Q60 36 50 45 L52 58 L44 62 Z" fill="${hairC}"/>`;
  // 머리 (얼굴)
  s += `<circle cx="60" cy="44" r="13" fill="${skin}"/>`;
  // 머리 모양
  if(a.hair==='topknot' || a.hair==='coronet'){
    s += `<path d="M47 41 Q60 26 73 41 L73 36 Q60 25 47 36 Z" fill="${hairC}"/><circle cx="60" cy="27.5" r="4.2" fill="${hairC}"/>`;
    s += a.hair==='coronet' ? `<rect x="53.5" y="25" width="13" height="4.5" rx="1.5" fill="#d9a441"/>` : `<rect x="56.5" y="25.5" width="7" height="2" rx="1" fill="${acc}"/>`;
  }else if(a.hair==='band'){ // 두건 (산적)
    s += `<path d="M47 40 Q60 28 73 40 L73 35 Q60 26 47 35 Z" fill="${hairC}"/><rect x="46.5" y="36" width="27" height="4.5" rx="2" fill="${acc}"/><path d="M73 38 L80 34 L78 42 Z" fill="${acc}"/>`;
  }else if(a.hair==='helmet'){ // 투구
    s += `<path d="M46 41 Q60 22 74 41 Z" fill="#7a8494"/><rect x="45" y="39" width="30" height="3.4" rx="1.7" fill="#5a6474"/><circle cx="60" cy="23.5" r="2.4" fill="${acc}"/>`;
  }else if(a.hair==='hood'){ // 두건/터번
    s += `<path d="M44 51 Q43 24 60 24 Q77 24 76 51 Q68 42 60 42 Q52 42 44 51 Z" fill="${a.hoodColor||'#1c1a18'}"/>`;
  }else if(a.hair==='bald'){
    s += `<path d="M48 39 Q60 30 72 39" stroke="#000" stroke-width="1" opacity=".15" fill="none"/>`;
  }
  // 얼굴: 눈가리개 또는 눈매
  if(a.blind){
    s += `<rect x="47" y="41" width="26" height="6" rx="2.5" fill="#2a2a30"/>`;
  }else{
    s += `<path d="M51 42 L57 43.5 M69 42 L63 43.5" stroke="#3a2a1a" stroke-width="1.6" stroke-linecap="round"/>`;
    s += `<circle cx="54.5" cy="45.5" r="1.5" fill="#1a1410"/><circle cx="65.5" cy="45.5" r="1.5" fill="#1a1410"/>`;
  }
  // 수염
  if(a.beard) s += `<path d="M51 51 Q60 56 69 51 L68 62 Q60 74 52 62 Z" fill="${a.beard}"/>`;
  s += `</svg>`;
  return s;
}

/* ===== 무공 카드 정의 (슬더스 방식) =====
   cost=기력 비용, type=attack(공격)/skill(기술)/power(비공·영구)
   dmg=피해, hits=타격 횟수, block=방어, draw=뽑기, heal=회복,
   poison=중독, weak=약화, strength=힘, perTurnBlock=매턴 방어
   up{...}=연마(+) 시 증가량, basic=기본 카드(보상에서 제외) */
const CARD_DEFS = {
  // ── 공격 ──
  strike:   {name:'타격',       cost:1, type:'attack', suit:'gwon', dmg:6,  up:{dmg:3}, basic:true},
  double:   {name:'연환격',     cost:1, type:'attack', suit:'gwon', dmg:4, hits:2, up:{dmg:2}},
  sword:    {name:'낙영검법',   cost:1, type:'attack', suit:'geom', dmg:9,  up:{dmg:4}},
  flick:    {name:'탄지신통',   cost:0, type:'attack', suit:'geom', dmg:4,  up:{dmg:3}},
  petals:   {name:'만천화우',   cost:1, type:'attack', suit:'geom', dmg:3, hits:3, up:{dmg:1}},
  palmwave: {name:'벽공장',     cost:1, type:'attack', suit:'jang', dmg:7,  up:{dmg:4}},
  dragon:   {name:'항룡십팔장', cost:2, type:'attack', suit:'jang', dmg:15, up:{dmg:6}},
  bone:     {name:'구음백골조', cost:1, type:'attack', suit:'gwon', dmg:5, poison:3, up:{poison:2}},
  mountain: {name:'파산권',     cost:2, type:'attack', suit:'gwon', dmg:13, up:{dmg:5}},
  lion:     {name:'사자후',     cost:2, type:'attack', suit:'gi',   dmg:8, weak:2, aoe:true, up:{dmg:4}},
  yiyang:   {name:'일양지',     cost:3, type:'attack', suit:'gi',   dmg:26, up:{dmg:9}},
  sweep:    {name:'횡소천군',   cost:2, type:'attack', suit:'geom', dmg:9, aoe:true, up:{dmg:4}},
  whirl:    {name:'선풍퇴',     cost:1, type:'attack', suit:'gwon', dmg:5, aoe:true, up:{dmg:3}},
  storm:    {name:'폭풍연권',   cost:2, type:'attack', suit:'gwon', dmg:4, hits:4, up:{dmg:1}},
  // ── 기술 (방어·보조) ──
  defend:   {name:'방어',       cost:1, type:'skill', suit:'gi',   block:5,  up:{block:3}, basic:true},
  iron:     {name:'철포삼',     cost:1, type:'skill', suit:'gwon', block:8,  up:{block:3}},
  light:    {name:'경신법',     cost:1, type:'skill', suit:'gi',   block:4, draw:1, up:{block:3}},
  bell:     {name:'금종조',     cost:2, type:'skill', suit:'gi',   block:14, up:{block:5}},
  breathe:  {name:'운기조식',   cost:1, type:'skill', suit:'gi',   block:4, heal:3, up:{heal:3}},
  seal:     {name:'점혈',       cost:0, type:'skill', suit:'jang', weak:1, up:{weak:1}},
  grip:     {name:'사혈금나수', cost:1, type:'skill', suit:'jang', block:3, weak:2, up:{weak:1}},
  // ── 비공 (사용 시 전투 내내 지속) ──
  neigong:  {name:'내공심법',   cost:1, type:'power', suit:'gi', strength:2, up:{strength:1}},
  guardian: {name:'호체신공',   cost:2, type:'power', suit:'gi', perTurnBlock:3, up:{perTurnBlock:2}},
  swift:    {name:'쾌수비결',   cost:2, type:'power', suit:'gwon', hitsPlus:1, up:{hitsPlus:1}},
};
// 보상으로 등장하는 카드 (기본 카드 제외)
const CARD_POOL = Object.keys(CARD_DEFS).filter(k=>!CARD_DEFS[k].basic);

/* ===== 연계 시스템 =====

   - 크리티컬: 연속 2장째부터 +15%씩 (피해 2배)
   - 연계기: 3연속마다 문파 고유 기술이 자동 발동 */

  gwon: {name:'붕권세',   desc:'적에게 8+힘 피해'},

// 현재 연계 단계 기준, 다음 같은 문파 카드의 크리티컬 확률(%)
function critChance(count){
  let v = Math.max(0, count-1) * 15;
  if(hasRelic('chwigwon')) v += 10;
  return Math.min(80, v);
}

/* ===== 게임 상태 ===== */
let G = null; // 전체 게임 상태 (새 게임 시작 시 초기화)

// 새 게임 상태 생성
function newGame(charId){
  const ch = CHARACTERS.find(c=>c.id===charId);
  const deck = [];
  let uid = 0;
  // 시작 덱: 캐릭터별 무공 카드 구성 (슬더스 방식 — 카드 하나가 기술 하나)
  for(const key of ch.deck){
    deck.push({id:uid++, key, up:0});
  }
  G = {
    char:ch, hp:ch.hp, maxHp:ch.hp, gold:ch.gold,
    relics:[ch.relic],
    deck, nextCardId:uid,
    act:0, floor:0, floors:genAct(),
    combat:null,
    screen:'map',
  };
}

function hasRelic(id){ return G.relics.includes(id); }
function relicInfo(id){ return RELICS.find(r=>r.id===id); }
// 비급 획득 공통 처리 — 획득 즉시 효과가 있는 비급은 여기서 적용
function gainRelic(id){
  G.relics.push(id);
  if(id==='hancheol'){ G.maxHp += 10; G.hp += 10; } // 한철 호완
}

/* ===== 지도 생성 (슬더스식) ===== */
// 8층 구조: 1층 전투 고정, 7층 객잔/상점, 8층 보스, 중간층은 무작위 2~3개 선택지
function genAct(){
  const floors = [];
  for(let f=1; f<=8; f++){
    let opts;
    if(f===1) opts = ['fight','fight'];
    else if(f===7) opts = ['rest','shop'];
    else if(f===8) opts = ['boss'];
    else{
      opts = [];
      const n = Math.random()<0.5 ? 2 : 3;
      for(let i=0;i<n;i++){
        const r = Math.random();
        let t = r<0.45?'fight': r<0.6?'elite': r<0.78?'event': r<0.9?'shop':'rest';
        // 한 층에 정예는 최대 1개 — 도망갈 길은 항상 남겨둔다
        if(t==='elite' && opts.includes('elite')) t = 'fight';
        opts.push(t);
      }
    }
    floors.push(opts);
  }
  // 3~6층 사이에 정예가 하나도 없으면 하나 강제 배치 (보상 흐름 보장)
  const hasElite = floors.slice(2,6).some(fl=>fl.includes('elite'));
  if(!hasElite){
    const f = 2 + Math.floor(Math.random()*4);
    floors[f][0] = 'elite';
  }
  return floors;
}

const NODE_META = {
  fight:{icon:'⚔️', label:'전투'},
  elite:{icon:'💀', label:'정예'},
  event:{icon:'🏮', label:'기연'},
  rest:{icon:'⛺', label:'객잔'},
  shop:{icon:'💰', label:'저잣거리'},
  boss:{icon:'👑', label:'보스'},
};

/* ===== 유틸 ===== */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ===== 카드 수치 계산 (슬더스 방식) ===== */
// 공격 피해: 기본 + 연마 + 문파 비급 + 힘
function cardDmg(card){
  const d = CARD_DEFS[card.key];
  let v = (d.dmg||0) + (card.up ? (d.up.dmg||0) : 0);
  if(hasRelic('gongmyeong') && d.suit==='gwon') v += 3;
  if(hasRelic('wolnyeo') && d.suit==='geom') v += 3;
  if(G.combat) v += G.combat.strength;
  return v;
}
// 방어: 기본 + 연마 + 도화도 진법
function cardBlock(card){
  const d = CARD_DEFS[card.key];
  let v = (d.block||0) + (card.up ? (d.up.block||0) : 0);
  if(hasRelic('dohwa') && d.type==='skill') v += 2;
  return v;
}
// 타격 횟수: 만천화우 비결/쾌수비결 = 다단히트 +, 연환벽력수 = 연계 3↑이면 모든 공격 +1
function cardHits(card){
  const d = CARD_DEFS[card.key];
  let h = d.hits || 1;
  if(h>1){
    if(hasRelic('mancheon')) h++;
    if(G.combat) h += (G.combat.hitsBonus || 0);
  }
  if(G.combat && d.dmg && hasRelic('byeokryeok') && G.combat.chainCount>=3) h++;
  return h;
}
// 중독/약화/회복/힘 등 공통 수치
function cardVal(card, field){
  const d = CARD_DEFS[card.key];
  let v = (d[field]||0) + (card.up ? (d.up[field]||0) : 0);
  if(field==='poison' && v>0 && hasRelic('baekgol')) v += 2;
  if(field==='strength' && v>0 && hasRelic('mumok')) v += 1;
  return v;
}
// 카드 설명 텍스트 (현재 보정치 반영)
function cardDesc(card){
  const d = CARD_DEFS[card.key];
  const parts = [];
  if(d.dmg) parts.push(`${d.aoe?'<b>모든 적</b>에게 ':''}피해 <b>${cardDmg(card)}</b>${cardHits(card)>1?` ×${cardHits(card)}`:''}`);
  if(d.block) parts.push(`방어 <b>${cardBlock(card)}</b>`);
  if(d.draw) parts.push(`카드 ${d.draw}장 뽑기`);
  if(d.heal) parts.push(`체력 ${cardVal(card,'heal')} 회복`);
  if(d.poison) parts.push(`중독 <b>${cardVal(card,'poison')}</b>`);
  if(d.weak) parts.push(`약화 <b>${cardVal(card,'weak')}</b>`);
  if(d.strength) parts.push(`힘 +${cardVal(card,'strength')} (영구)`);
  if(d.perTurnBlock) parts.push(`매 턴 방어 +${cardVal(card,'perTurnBlock')}`);
  if(d.hitsPlus) parts.push(`다단히트 타격 +${cardVal(card,'hitsPlus')} (지속)`);
  return parts.join('<br>');
}
/* ===== 다중 적 헬퍼 ===== */
// 살아있는 적 목록
function aliveEnemies(){ return G.combat ? G.combat.enemies.filter(e=>!e.dead) : []; }
// 현재 목표 적 (죽었으면 첫 생존자로 자동 이동)
function curEnemy(){
  const c = G.combat;
  const t = c.enemies[c.target];
  if(t && !t.dead) return t;
  const a = aliveEnemies()[0];
  if(a) c.target = a.idx;
  return a;
}
// 적 클릭으로 목표 지정
function setTarget(i){
  const c = G.combat;
  if(!c || c.busy) return;
  const e = c.enemies[i];
  if(!e || e.dead || c.target===i) return;
  c.target = i;
  sfx('card');
  render();
}
// 특정 적에게 피해 적용 (방어 먼저 소모), 실제 들어간 피해를 돌려준다
function dealToEnemy(amount, en){
  const e = en || curEnemy();
  if(!e) return 0;
  let dmg = amount;
  if(e.block>0){
    const ab = Math.min(e.block, dmg);
    e.block -= ab; dmg -= ab;
  }
  e.hp = Math.max(0, e.hp - dmg);
  if(e.hp<=0) e.dead = true;
  return dmg;
}

/* ===== 전투 ===== */
function startCombat(encounter, kind){
  // 조우는 적 1~3명 배열 (단일 정의도 허용)
  const defs = Array.isArray(encounter) ? encounter : [encounter];
  const enemies = defs.map((d,i)=>({
    idx:i,
    face:d.face, name:d.name,
    art:d.art, // SVG 초상 설정
    hp:d.hp, maxHp:d.hp,
    moves:d.moves, moveIdx:0,
    block:0, atkBonus:0,
    poison:0, weak:0, dead:false, // 상태이상·생사
  }));
  G.combat = {
    kind, // 'fight' | 'elite' | 'boss'
    enemies, target:0,
    encName: enemies[0].name + (enemies.length>1 ? ` 외 ${enemies.length-1}` : ''),
    drawPile:shuffle(G.deck.map(c=>({...c}))), // 전투용 사본 덱
    hand:[], discardPile:[],
    energy:0, maxEnergy:3 + (hasRelic('gueum')?1:0), // 기력 (구음진경 +1)
    block:0,
    strength: hasRelic('hangryong') ? 1 : 0, // 힘 (항룡십팔장 비급)
    perTurnBlock:0,   // 호체신공 누적
    hitsBonus:0,      // 쾌수비결 누적 (다단히트 +)
    turn:0,
    firstAtkDone:false, // 일양지 (첫 공격 2배) 사용 여부
    chainSuit:null, chainCount:0, // 연계: 마지막 문파 / 연속 횟수
    busy:false,         // 연출 재생 중 입력 잠금
    hitEi:null,         // 방금 맞은 적 (연출용: 번호 또는 'all')
    log: kind==='boss' ? ACTS[G.act].bossIntro :
         (enemies.length>1 ? `${enemies.length}명의 적이 앞을 막아선다!` : `${enemies[0].name}이(가) 길을 막는다!`),
  };
  // 진우의 철궁 — 전투 시작과 동시에 화살 한 발 (첫 번째 적)
  if(hasRelic('singung')){
    enemies[0].hp = Math.max(1, enemies[0].hp - 15);
    G.combat.log += ' 🏹 철궁이 먼저 울었다! (15 피해)';
  }
  // 독질려 — 전투 시작 시 모든 적에게 중독 살포
  if(hasRelic('dokjil')){
    enemies.forEach(e=>{ e.poison = 4; });
    G.combat.log += ' 🌵 독질려가 흩뿌려졌다! (전원 중독 4)';
  }
  startPlayerTurn();
  G.screen='combat';
  render();
  // 처음 플레이하는 사람에게 첫 전투에서 가이드를 한 번 보여준다
  if(kind==='fight' && !storageGet('hg_guide_seen')){
    storageSet('hg_guide_seen','1');
    setTimeout(showGuide, 400);
  }
}

// n장 뽑기 (덱이 비면 버림 더미를 섞어 재사용)
function drawCards(n){
  const c = G.combat;
  for(let i=0;i<n;i++){
    if(!c.drawPile.length){
      if(!c.discardPile.length) break;
      c.drawPile = shuffle(c.discardPile);
      c.discardPile = [];
    }
    c.hand.push(c.drawPile.pop());
  }
}

// 새 턴 시작 — 기력 회복, 방어 재설정, 카드 뽑기 (슬더스 방식)
function startPlayerTurn(){
  const c = G.combat;
  c.turn++;
  c.energy = c.maxEnergy + (c.turn===1 && hasRelic('shinhaeng') ? 1 : 0); // 신행백변: 첫 턴 기력 +1
  // 방어는 매 턴 초기화. 호체신공/연위갑/합마공 보너스만 얹고 시작
  c.block = c.perTurnBlock
    + (hasRelic('yeonwi') ? 3 : 0)
    + (c.turn===1 && hasRelic('hapma') ? 12 : 0);
  if(hasRelic('guhwa')) G.hp = Math.min(G.maxHp, G.hp + 2); // 구화옥로환
  drawCards(5 + (hasRelic('dagu')?1:0) + (c.turn===1 && hasRelic('jwau')?2:0));
}

// 카드 사용 — 기력을 소모해 즉시 발동 (슬더스 방식)
function playCard(id){
  const c = G.combat;
  if(!c || c.busy) return;
  const card = c.hand.find(h=>h.id===id);
  if(!card) return;
  const d = CARD_DEFS[card.key];
  if(c.energy < d.cost){
    c.log = '⚡ 기력이 부족하다!';
    render();
    return;
  }
  const tgt = curEnemy(); // 현재 목표 적
  if(d.dmg && !tgt) return;
  c.busy = true;
  sfx('card'); // 카드 내는 소리
  // 카드 비행 연출
  const el = document.querySelector(`[data-cid="${id}"]`);
  if(el) el.classList.add('fly');
  // 공격 카드: 목표 적을 향해 돌진 + 공격 동작 / 그 외: 시전 자세
  const dashDist = figDistance(tgt ? `.enemy-face[data-ei="${tgt.idx}"]` : null);
  if(d.dmg){
    dashTo('.player-fighter', dashDist);
    heroAnim('attack', 560);
  }else{
    const pf = document.querySelector('.player-face');
    if(pf) pf.classList.add('cast');
  }
  setTimeout(()=>{
    if(G.combat!==c) return;
    // 광역이면 모든 생존 적, 아니면 목표 적 하나
    const targets = d.aoe ? aliveEnemies() : (tgt && !tgt.dead ? [tgt] : aliveEnemies().slice(0,1));
    c.hitEi = null;
    c.energy -= d.cost;
    // 손에서 제거 (비공은 전투 동안 지속되므로 소멸, 나머지는 버림 더미로)
    const idx = c.hand.findIndex(h=>h.id===id);
    if(idx>=0) c.hand.splice(idx,1);
    if(d.type!=='power') c.discardPile.push(card);
    const logs = [];
    let atkShown = 0;
    let isCrit = false;
    let chainArt = null;
    // ── 연계 판정: 같은 문파 연속이면 단계 상승, 아니면 새로 시작 ──
    if(c.chainSuit === d.suit) c.chainCount++;
    else { c.chainSuit = d.suit; c.chainCount = 1; }
    // ── 공격 효과 ──
    if(d.dmg && targets.length){
      let per = cardDmg(card);
      if(hasRelic('ilyang') && !c.firstAtkDone){ per *= 2; logs.push('☝️ 일양지 개안 — 피해 2배!'); }
      c.firstAtkDone = true;
      // 크리티컬: 연계 단계가 높을수록 확률 상승 (2연속째부터 +15%씩)
      const chance = critChance(c.chainCount);
      if(chance > 0 && Math.random()*100 < chance){
        isCrit = true;
        per = Math.floor(per * (hasRelic('chonggang') ? 2.5 : 2));
        logs.push(`💥 <b class="red">회심의 일격!</b> (${chance}%)`);
        if(hasRelic('okbong')){ targets.forEach(t=>{ t.poison += 2; }); logs.push('🐝 옥봉침 — 중독 2'); }
      }
      const hits = cardHits(card);
      for(const t of targets){
        for(let i=0;i<hits;i++) dealToEnemy(per, t);
      }
      atkShown = per;
      logs.push(`피해 <b class="gold">${per}${hits>1?'×'+hits:''}</b>${d.aoe?' (전체)':''}`);
      c.hitEi = d.aoe ? 'all' : targets[0].idx;
    }
    // ── 연계기: 같은 문파 3연속(전진검진 보유 시 2연속)마다 자동 발동 (첫 생존 적에게) ──
    const chainNeed = hasRelic('jinjin') ? 2 : 3;
    const artTgt = curEnemy();
    if(c.chainCount >= chainNeed && c.chainCount % chainNeed === 0 && (artTgt || d.suit==='gi')){
      chainArt = CHAIN_ARTS[d.suit];
      if(d.suit==='gwon'){ dealToEnemy(8 + c.strength, artTgt); }
      else if(d.suit==='geom'){ dealToEnemy(5 + c.strength, artTgt); dealToEnemy(5 + c.strength, artTgt); }
      else if(d.suit==='jang'){ dealToEnemy(5 + c.strength, artTgt); if(artTgt) artTgt.weak += 1; }
      else { c.energy += 1; }
      logs.push(`🔗 연계기 【<b class="gold">${chainArt.name}</b>】`);
      if(d.suit!=='gi' && artTgt && c.hitEi===null) c.hitEi = artTgt.idx;
    }
    // ── 방어·보조 효과 (중독/약화는 광역 여부 따름) ──
    if(d.block){ const b = cardBlock(card); c.block += b; logs.push(`🛡️ 방어 +${b}`); }
    if(d.heal){ const h = cardVal(card,'heal'); G.hp = Math.min(G.maxHp, G.hp+h); logs.push(`💚 회복 ${h}`); }
    if(d.poison){ const p = cardVal(card,'poison'); targets.forEach(t=>{ t.poison += p; }); logs.push(`☠️ 중독 ${p}${d.aoe?' (전체)':''}`); }
    if(d.weak){ const w = cardVal(card,'weak'); targets.forEach(t=>{ t.weak += w; }); logs.push(`💫 약화 ${w}${d.aoe?' (전체)':''}`); }
    if(d.strength){ const s = cardVal(card,'strength'); c.strength += s; logs.push(`💪 힘 +${s}`); }
    if(d.perTurnBlock){ const pb = cardVal(card,'perTurnBlock'); c.perTurnBlock += pb; logs.push(`🛡️ 매 턴 방어 +${pb}`); }
    if(d.hitsPlus){ const hp2 = cardVal(card,'hitsPlus'); c.hitsBonus += hp2; logs.push(`⚡ 다단히트 타격 +${hp2}`); }
    if(d.draw) drawCards(d.draw);
    c.log = `${d.name}${card.up?'+':''} — ` + logs.join(' · ');
    render();
    // 타격 지점에서 렌더가 새로 그려졌으므로, 새 캐릭터를 적 앞에서 제자리로 복귀시킨다
    if(d.dmg){ dashBack('.player-fighter', dashDist); heroAnim('attack', 320); }
    // 효과음: 공격은 문파별 타격음(크리티컬은 전용음), 방어·중독·연계기도 각각
    if(d.dmg) sfx(isCrit ? 'crit' : d.suit);
    else if(d.block) sfx('guard');
    else if(d.poison || d.weak) sfx('poison');
    else sfx('gi');
    if(d.dmg && d.block) sfx('guard');
    if(chainArt) sfx('chain');
    // 연출: 크리티컬 > 연계기 > 큰 기술 순으로 스플래시, 공격은 문파별 이펙트 (맞은 적마다)
    if(isCrit) fxSplash('회심의 일격!');
    else if(chainArt) fxSplash(chainArt.name, '연계기');
    else if(d.cost>=2) fxSplash(d.name);
    for(const t of targets){
      const er = rectOf(`.enemy-face[data-ei="${t.idx}"]`);
      if(!er) continue;
      const ex = er.left + er.width/2, ey = er.top + er.height/2;
      if(d.dmg){
        fxImpact(d.suit, ex, ey);
        fxFloat(ex, er.top, atkShown*cardHits(card), isCrit ? '#ff5a40' : 'var(--gold)', isCrit ? 42 : 32);
      }
      if(d.poison) fxFloat(ex+34, ey, '☠️', '#9acd6a', 22);
      if(d.weak) fxFloat(ex-34, ey, '💫', '#c8a0e0', 22);
    }
    if(isCrit) fxShake();
    if(chainArt && artTgt){
      const ar = rectOf(`.enemy-face[data-ei="${artTgt.idx}"]`);
      if(ar && d.suit!=='gi'){ fxRing(ar.left+ar.width/2, ar.top+ar.height/2, SUIT_FX[d.suit], 120); fxFloat(ar.left+ar.width/2, ar.top+ar.height/2+26, '연계 '+chainArt.name, SUIT_FX[d.suit], 17); }
    }
    if(chainArt && d.suit==='gi'){
      const pr = rectOf('.player-face');
      if(pr) fxFloat(pr.left+pr.width/2, pr.top, '⚡ 기순환 +1', SUIT_FX.gi, 20);
    }
    if(d.block){
      const pf = rectOf('.player-face');
      if(pf) fxGuard(pf.left + pf.width/2, pf.top + pf.height*0.55, cardBlock(card));
    }
    // 전멸 시: KO 연출 후 승리
    if(!aliveEnemies().length){
      document.querySelectorAll('.enemy-face').forEach(ef=>ef.classList.add('ko'));
      setTimeout(()=>{ if(G.combat===c) winCombat(); }, 700);
      return;
    }
    setTimeout(()=>{
      if(G.combat!==c) return;
      c.hitEi = null;
      c.busy = false;
      render();
    }, d.dmg ? 340 : 140);
  }, 250);
}

// 턴 종료 — 비급 여운 정산 → 손 버리기 → 적들의 순차 행동 → 새 턴
function endTurn(){
  const c = G.combat;
  if(!c || c.busy) return;
  c.busy = true;
  // 탄지신통(남은 기력×3) / 벽해조생곡(4) — 턴 종료 여운 피해 (목표 적)
  let bonus = 0;
  if(hasRelic('tanji') && c.energy>0) bonus += c.energy*3;
  if(hasRelic('byeokhae')) bonus += 4;
  if(bonus>0){
    const bt = curEnemy();
    if(bt){
      dealToEnemy(bonus, bt);
      const er = rectOf(`.enemy-face[data-ei="${bt.idx}"]`);
      if(er){ fxRing(er.left+er.width/2, er.top+er.height/2, SUIT_FX.gi, 0); fxFloat(er.left+er.width/2, er.top, bonus, 'var(--gi)', 24); }
    }
  }
  if(!aliveEnemies().length){
    c.log = '🎯 여운의 일격이 적을 쓰러뜨렸다!';
    render();
    document.querySelectorAll('.enemy-face').forEach(ef=>ef.classList.add('ko'));
    setTimeout(()=>{ if(G.combat===c) winCombat(); }, 700);
    return;
  }
  // 손패 전부 버림
  c.discardPile.push(...c.hand);
  c.hand = [];
  c.log = bonus>0 ? `🎯 여운 피해 ${bonus}` : `${c.turn}번째 합 종료.`;
  render();
  enemyPhase(0); // 적들이 한 명씩 순서대로 행동
}

// 적 행동 단계 — i번째 적부터 순차 진행 (중독 정산 → 의도 실행 → 다음 적)
function enemyPhase(i){
  const c = G.combat;
  if(!c || G.combat!==c) return;
  // 모든 적이 행동을 마치면 새 턴 시작
  if(i >= c.enemies.length){
    startPlayerTurn();
    c.busy = false;
    render();
    return;
  }
  const en = c.enemies[i];
  if(en.dead){ enemyPhase(i+1); return; }
  // 중독: 행동 전 남은 수치만큼 피해 후 1 감소
  if(en.poison>0){
    en.hp = Math.max(0, en.hp - en.poison);
    c.log += `<br>☠️ ${esc(en.name)} 중독 피해 ${en.poison}`;
    sfx('poison');
    const er = rectOf(`.enemy-face[data-ei="${en.idx}"]`);
    if(er) fxFloat(er.left+er.width/2, er.top+24, en.poison, '#9acd6a', 22);
    en.poison--;
    if(en.hp<=0){
      en.dead = true;
      render();
      if(!aliveEnemies().length){
        document.querySelectorAll('.enemy-face').forEach(ef=>ef.classList.add('ko'));
        setTimeout(()=>{ if(G.combat===c) winCombat(); }, 700);
        return;
      }
      setTimeout(()=>enemyPhase(i+1), 350);
      return;
    }
  }
  const mv = en.moves[en.moveIdx % en.moves.length];
  const eDash = figDistance(`.enemy-face[data-ei="${en.idx}"]`);
  if(mv.t==='atk') dashTo(`.enemy-fighter[data-ei="${en.idx}"]`, -eDash);
  setTimeout(()=>{
    if(G.combat!==c) return;
    en.moveIdx++;
    let dealt = 0, absorbed = 0;
    if(mv.t==='atk'){
      let dmg = mv.v + en.atkBonus;
      if(en.weak>0) dmg = Math.floor(dmg*0.75); // 약화: 공격력 25% 감소
      absorbed = Math.min(c.block, dmg);
      c.block -= absorbed; dmg -= absorbed;
      G.hp = Math.max(0, G.hp - dmg);
      dealt = dmg;
      c.log += `<br>🗡️ ${esc(en.name)}의 공격! <b class="red">${dmg}</b> 피해` + (absorbed?` (${absorbed} 방어)`:'') + (en.weak>0?' <span class="dim">— 약화됨</span>':'');
      if(G.hp<=0){ G.screen='gameover'; sfx('lose'); render(); return; }
      if(dealt>0){ fxShake(); fxVignette(); sfx('hurt'); }
      else if(absorbed>0) sfx('guard');
    }else if(mv.t==='def'){
      en.block += mv.v;
      c.log += `<br>🛡️ ${esc(en.name)}이(가) 수세를 취한다. (방어 ${mv.v})`;
    }else if(mv.t==='buff'){
      en.atkBonus += mv.v;
      c.log += `<br>🔥 ${esc(en.name)}의 기세가 오른다! (공격 +${mv.v})`;
    }
    if(en.weak>0) en.weak--; // 약화 지속 감소
    render();
    // 복귀 + 내 캐릭터 피격/방어 연출
    if(mv.t==='atk'){
      dashBack(`.enemy-fighter[data-ei="${en.idx}"]`, -eDash);
      const pf = rectOf('.player-face');
      if(dealt>0){
        const pfe = document.querySelector('.player-face');
        if(pfe) pfe.classList.add('hit');
        heroAnim('hurtanim', 420); // 피격 스프라이트 동작
        if(pf) fxFloat(pf.left+pf.width/2, pf.top, '-'+dealt, '#e06050', 30);
      }
      if(absorbed>0 && pf) fxGuardHit(pf.left+pf.width/2, pf.top+pf.height*0.55, absorbed, dealt===0);
    }
    setTimeout(()=>enemyPhase(i+1), mv.t==='atk' ? 420 : 260);
  }, mv.t==='atk' ? 300 : 140);
}

// 다음 적 의도 미리보기 (약화 반영)
function intentText(e){
  const mv = e.moves[e.moveIdx % e.moves.length];
  if(mv.t==='atk'){
    let v = mv.v + e.atkBonus;
    if(e.weak>0) v = Math.floor(v*0.75);
    return {icon:'⚔️', text:`공격 ${v}`};
  }
  if(mv.t==='def') return {icon:'🛡️', text:`방어 ${mv.v}`};
  return {icon:'🔥', text:'기세 상승'};
}

// 전투 승리 → 보상 화면
function winCombat(){
  sfx('win');
  const c = G.combat;
  let gold = c.kind==='boss' ? 90 : c.kind==='elite' ? 55 : 22 + Math.floor(Math.random()*14);
  if(hasRelic('jukbong')) gold += 15;
  G.gold += gold;
  if(hasRelic('youngyak')) G.hp = Math.min(G.maxHp, G.hp + 6);
  if(hasRelic('sulga')){ G.maxHp += 2; G.hp += 2; } // 보은의 술도가: 승리마다 최대 체력 +2
  // 카드 보상 3장 생성 — 서로 다른 무공 카드 (20% 확률로 연마된 카드)
  const cardChoices = shuffle(CARD_POOL).slice(0,3).map(k=>({
    id:G.nextCardId++,
    key:k,
    up: Math.random()<0.2 ? 1 : 0,
  }));
  // 정예/보스는 비급 보상 추가
  let relicChoice = null;
  if(c.kind==='elite' || c.kind==='boss'){
    const avail = RELICS.filter(r=>!G.relics.includes(r.id));
    if(avail.length) relicChoice = pick(avail);
  }
  G.reward = {gold, cardChoices, relicChoice, kind:c.kind, enemyName:c.encName};
  G.combat = null;
  G.screen='reward';
  render();
}

// 보상 수령 완료 → 다음 층 or 다음 막 or 엔딩
function finishNode(){
  const wasBoss = G.floors[G.floor] && G.floors[G.floor][0]==='boss';
  if(wasBoss){
    const finished = G.act;
    // 최종 보스 격파 → 엔딩 나레이션 → 승리 화면
    if(G.act >= ACTS.length-1){
      showStory(STORY.ending, ()=>{ G.screen='victory'; render(); }, '전설이 되다');
      return;
    }
    G.act++;
    G.floor = 0;
    G.floors = genAct();
    // 막 전환 시 체력 30% 회복 (원기 회복)
    G.hp = Math.min(G.maxHp, G.hp + Math.floor(G.maxHp*0.3));
    saveGame(); // 막 전환 자동 저장
    // 보스 격파 후일담 + 다음 막 도입 나레이션
    showStory([STORY.bossPost[finished], STORY.actIntro[G.act]], ()=>{ G.screen='map'; render(); }, '지도를 펼친다');
    return;
  }
  G.floor++;
  saveGame(); // 층 이동 자동 저장
  G.screen='map';
  render();
}

/* ===== 노드 진입 ===== */
function enterNode(type){
  const act = ACTS[G.act];
  if(type==='fight'){
    // 1막은 단독 조우만, 2막부터 55% 확률로 2~3명 편성 등장
    const enc = (act.groups && Math.random()<0.55) ? pick(act.groups) : [pick(act.pool)];
    startCombat(enc, 'fight');
  }
  else if(type==='elite') startCombat(act.elite, 'elite');
  // 보스는 대화 나레이션을 먼저 보여준 뒤 전투 시작
  else if(type==='boss') showStory([STORY.bossPre[G.act]], ()=>startCombat(ACTS[G.act].boss, 'boss'), '비무 개시!');
  else if(type==='event'){ G.event = pick(EVENTS); G.screen='event'; render(); }
  else if(type==='rest'){ G.restDone = null; G.pickMode = null; G.screen='rest'; render(); } // 이전 방문 상태 초기화
  else if(type==='shop'){ openShop(); }
}

/* ===== 상점 ===== */
function openShop(){
  const avail = shuffle(RELICS.filter(r=>!G.relics.includes(r.id) && r.price>0)).slice(0,2);
  G.shop = {relics:avail, removed:false, healed:false};
  G.screen='shop';
  render();
}
function buyRelic(id){
  const r = relicInfo(id);
  if(G.gold < r.price) return;
  G.gold -= r.price;
  sfx('gold');
  gainRelic(id);
  G.shop.relics = G.shop.relics.filter(x=>x.id!==id);
  render();
}

/* ===== 이벤트 효과 ===== */
function eventAct(act){
  const done = (msg)=>{ G.eventResult = msg; render(); };
  if(act==='skip'){ finishNode(); return; }
  if(act==='gold'){ G.gold += 40; done('골드 40을 받았다.'); return; }
  if(act==='maxhp'){ G.maxHp += 8; G.hp = Math.min(G.maxHp, G.hp+8); done('최대 체력이 8 늘고, 체력을 8 회복했다!'); return; }
  if(act==='relic'){
    const avail = RELICS.filter(r=>!G.relics.includes(r.id));
    if(!avail.length){ G.gold += 60; done('배울 비급이 없어 골드 60을 받았다.'); return; }
    const r = pick(avail); gainRelic(r.id);
    done(`${r.icon} <b class="gold">${r.name}</b>을(를) 전수받았다! — ${r.desc}`); return;
  }
  if(act==='gamble'){
    if(Math.random()<0.5){
      const avail = RELICS.filter(r=>!G.relics.includes(r.id));
      if(avail.length){ const r = pick(avail); gainRelic(r.id);
        done(`곡조를 버텨냈다! ${r.icon} <b class="gold">${r.name}</b> 획득 — ${r.desc}`); return; }
      G.gold += 80; done('곡조를 버텨냈다! 골드 80을 받았다.'); return;
    }
    G.hp = Math.max(1, G.hp-12);
    done('심법이 흐트러졌다… <b class="red">체력 -12</b>'); return;
  }
  if(act==='upgrade2'){
    const cand = shuffle(G.deck.filter(c=>!c.up)).slice(0,2);
    for(const c of cand) c.up = 1;
    done(cand.length ? `카드 ${cand.length}장이 연마되었다! (${cand.map(c=>CARD_DEFS[c.key].name+'+').join(', ')})` : '더 연마할 카드가 없다…'); return;
  }
  if(act==='dupCard'){ G.pickMode = {type:'dup'}; render(); return; }
  if(act==='removeCard'){ G.pickMode = {type:'remove', from:'event'}; render(); return; }
}

// 덱에서 카드 1장 선택 처리 (복제/제거/연마 공용)
function pickDeckCard(id){
  const pm = G.pickMode;
  const idx = G.deck.findIndex(c=>c.id===id);
  if(idx<0) return;
  const card = G.deck[idx];
  const dname = CARD_DEFS[card.key].name;
  if(pm.type==='dup'){
    G.deck.push({...card, id:G.nextCardId++});
    G.pickMode = null;
    G.eventResult = `[${dname}]을(를) 복제했다!`;
    render(); return;
  }
  if(pm.type==='remove'){
    G.deck.splice(idx,1);
    const from = pm.from;
    G.pickMode = null;
    if(from==='shop'){ G.shop.removed = true; render(); }
    else { G.eventResult = `[${dname}]을(를) 잊었다.`; render(); }
    return;
  }
  if(pm.type==='upgrade'){
    if(card.up) return; // 이미 연마된 카드
    card.up = 1;
    G.pickMode = null;
    G.restDone = `[${dname}]을(를) 연마했다! → ${dname}+`;
    render(); return;
  }
}

/* ===== 렌더링 ===== */
const app = document.getElementById('app');

function render(){
  if(!G){ renderTitle(); return; }
  switch(G.screen){
    case 'charselect': renderCharSelect(); break;
    case 'story': renderStory(); break;
    case 'map': renderMap(); break;
    case 'combat': renderCombat(); break;
    case 'reward': renderReward(); break;
    case 'shop': renderShop(); break;
    case 'rest': renderRest(); break;
    case 'event': renderEvent(); break;
    case 'gameover': renderGameOver(); break;
    case 'victory': renderVictory(); break;
    default: renderTitle();
  }
}

/* --- 스토리(나레이션) 화면 --- */
// pages: [{h, body}], cb: 마지막 페이지 후 실행, endLabel: 마지막 버튼 문구
function showStory(pages, cb, endLabel){
  G.story = {pages, idx:0, cb, endLabel};
  G.screen = 'story';
  render();
}
function renderStory(){
  const st = G.story;
  const pg = st.pages[st.idx];
  // {HERO} 치환 후 줄 단위로 나눠 순차 페이드인
  const body = pg.body.replaceAll('{HERO}', G.char ? G.char.name : '협객');
  const paras = body.split('\n').map((t,i)=>
    `<div class="story-p" style="animation-delay:${0.15 + i*0.4}s">${t}</div>`).join('');
  const last = st.idx === st.pages.length-1;
  // 장면 일러스트: 'boss'는 현재 막 보스 초상, 그 외는 SCENES 풍경
  let imgHtml = '';
  if(pg.img){
    const svg = pg.img==='boss' ? enemySVG(ACTS[G.act].boss.art) : (SCENES[pg.img]||'');
    if(svg) imgHtml = `<div class="story-img ${pg.img==='boss'?'portrait':''}">${svg}</div>`;
  }
  app.innerHTML = `<div class="center-panel story-panel">
    ${imgHtml}
    ${pg.h ? `<div class="story-h">${pg.h}</div>` : ''}
    <div class="story-body">${paras}</div>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button class="primary" onclick="storyNext()">${last ? (st.endLabel||'계속') : '계속 ▸'}</button>
      ${!last ? `<button onclick="storySkip()">건너뛰기 ▸▸</button>` : ''}
    </div>
    <div class="dim" style="font-size:11px;">${st.idx+1} / ${st.pages.length}</div>
  </div>`;
}
function storyNext(){
  const st = G.story;
  if(st.idx < st.pages.length-1){ st.idx++; render(); }
  else{ const cb = st.cb; G.story = null; cb(); }
}
function storySkip(){
  const cb = G.story.cb;
  G.story = null;
  cb();
}

/* --- 지도 --- */
function renderMap(){
  const act = ACTS[G.act];
  const rows = G.floors.map((opts, fi)=>{
    const nodes = opts.map((t,oi)=>{
      const m = NODE_META[t];
      let cls = 'map-node';
      let onclick = '';
      if(fi < G.floor) cls += ' done';
      else if(fi === G.floor){ cls += ' avail'; onclick = `onclick="enterNode('${t}')"`; }
      else cls += ' future';
      return `<div class="${cls}" ${onclick}><span class="nicon">${m.icon}</span>${m.label}</div>`;
    }).join('');
    return `<div class="map-floor"><span class="floor-num">${fi+1}층</span>${nodes}</div>`;
  }).join('');
  app.innerHTML = hudHTML() + `

function renderCombat(){
  const c = G.combat;
  const kindLabel = c.kind==='boss'?'👑 보스전':c.kind==='elite'?'💀 정예전':'⚔️ 전투';
  // 적 초상 크기: 수가 많을수록 작게
  const n = c.enemies.length;
  const sz = n>=3 ? 84 : n===2 ? 104 : 130;
  // 적 캐릭터들 (클릭 = 목표 지정)
  const enemyFigs = c.enemies.map(en=>{
    const it = intentText(en);
    const st = [];
    if(en.poison>0) st.push(`<span style="color:#9acd6a">☠${en.poison}</span>`);
    if(en.weak>0) st.push(`<span style="color:#c8a0e0">💫${en.weak}</span>`);
    if(en.atkBonus>0) st.push(`<span style="color:#e08050">🔥+${en.atkBonus}</span>`);
    const hitCls = (c.hitEi==='all' || c.hitEi===en.idx) ? 'hit' : '';
    const tgtCls = (!en.dead && c.target===en.idx && aliveEnemies().length>1) ? 'targeted' : '';
    return `<div class="fighter enemy-fighter ${en.dead?'dead':''} ${tgtCls}" data-ei="${en.idx}" onclick="setTarget(${en.idx})">

      <div class="fstats" style="font-size:12px;">${st.join(' ') || ''}</div>

  // 손패 (기력 부족 카드는 흐리게)
  const handCards = c.hand.map(card=>{

    return cardHTML(card, no, `onclick="playCard(${card.id})"`);
  }).join('');
  app.innerHTML = hudHTML() + `<div class="combat">
    <div class="battlefield">
      <div class="fighter player-fighter">
        <div class="fhead"><b>${G.char.name}</b></div>
        <div class="player-face"><div class="hero-sprite h-${G.char.id} idle"></div></div>
        <div class="fhp"><div class="fhp-fill" style="width:${Math.max(0,G.hp/G.maxHp*100)}%"></div><span>${G.hp} / ${G.maxHp}</span></div>
        <div class="fstats">

          ${c.perTurnBlock ? `<span class="dim">🧘 +${c.perTurnBlock}</span>` : ''}
        </div>
      </div>
      <div class="battle-mid">
        <div style="font-size:12px;">${kindLabel}</div>
        <div style="font-size:24px;">⚔</div>
        <div style="font-size:12px;">${c.turn}합</div>
        ${aliveEnemies().length>1 ? '<div style="font-size:11px;" class="dim">적을 눌러<br>목표 지정</div>' : ''}

      <div class="enemy-group">${enemyFigs}</div>
    </div>
    <div class="player-bar">
      <div class="energy-orb" title="기력 — 카드를 낼 때 소모"><b>${c.energy}</b>/${c.maxEnergy}</div>

      <span class="spacer"></span>
      <button class="primary" style="font-size:16px; padding:11px 34px;" onclick="endTurn()" ${c.busy?'disabled':''}>턴 종료</button>

function restHeal(){
  const before = G.hp;
  G.hp = Math.min(G.maxHp, G.hp + Math.floor(G.maxHp*0.3));
  G.restDone = `체력을 ${G.hp - before} 회복했다. (❤️ ${G.hp}/${G.maxHp})`;
  sfx('gold');

}

  const s = G.shop;

    const can = G.gold>=r.price;
    return `<div class="relic-box ${can?'':'disabled'}" ${can?`onclick="buyRelic('${r.id}')"`:''}>

  app.innerHTML = hudHTML() + `<div class="center-panel">
    <div class="event-art">💰</div>

      <button onclick="shopRemove()" ${!s.removed && G.gold>=60 ? '' : 'disabled'}>🗑️ 초식 파기 — 카드 1장 제거 (💰60)</button>
      <button onclick="shopHeal()" ${!s.healed && G.gold>=30 ? '' : 'disabled'}>🥟 만두 — 체력 +15 (💰30)</button>

/* ===== 효과음 (Web Audio 합성 — 외부 파일 없이 코드로 소리 생성) ===== */
let AC = null; // AudioContext (첫 입력 후 생성 — 브라우저 자동재생 정책)
let sfxOn = storageGet('hg_sfx') !== 'off';
function audioCtx(){
  if(!AC){
    try{ AC = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ return null; }
  }
  if(AC && AC.state === 'suspended') AC.resume();
  return AC;
}
// 첫 클릭/터치에서 오디오 잠금 해제
document.addEventListener('pointerdown', audioCtx);

// 단일 톤: 주파수 슬라이드(f→f2) + 빠른 감쇠 엔벨로프
function tone(o){
  const a = audioCtx(); if(!a) return;
  const t = a.currentTime + (o.delay||0);
  const dur = o.dur || 0.15;
  const osc = a.createOscillator();
  const g = a.createGain();
  osc.type = o.type || 'sine';
  osc.frequency.setValueAtTime(o.f || 440, t);
  if(o.f2) osc.frequency.exponentialRampToValueAtTime(Math.max(20, o.f2), t + dur);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(o.vol || 0.2, t + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g); g.connect(a.destination);
  osc.start(t); osc.stop(t + dur + 0.05);
}
// 노이즈 버스트: 타격감·바람소리 (필터로 색깔 조절)
function noiseHit(o){
  const a = audioCtx(); if(!a) return;
  const t = a.currentTime + (o.delay||0);
  const dur = o.dur || 0.15;
  const buf = a.createBuffer(1, Math.floor(a.sampleRate*dur), a.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = a.createBufferSource(); src.buffer = buf;
  const f = a.createBiquadFilter();
  f.type = o.hp ? 'highpass' : 'lowpass';
  f.frequency.value = o.cut || 1000;
  const g = a.createGain(); g.gain.value = o.vol || 0.2;
  src.connect(f); f.connect(g); g.connect(a.destination);
  src.start(t);
}
// 이름으로 효과음 재생
function sfx(name){
  if(!sfxOn) return;
  switch(name){
    case 'card':   noiseHit({dur:.07, cut:2600, hp:true, vol:.09}); break;                 // 카드 스냅
    case 'geom':   noiseHit({dur:.13, cut:3200, hp:true, vol:.20}); tone({f:2400, f2:500, type:'sawtooth', dur:.12, vol:.07}); break; // 검: 금속성 참격
    case 'jang':   noiseHit({dur:.2,  cut:480, vol:.28}); tone({f:220, f2:70, dur:.22, vol:.24}); break;    // 장: 묵직한 장풍
    case 'gwon':   tone({f:150, f2:48, dur:.16, vol:.34}); noiseHit({dur:.1, cut:800, vol:.18}); break;     // 권: 둔탁한 타격
    case 'gi':     tone({f:600, f2:1300, dur:.26, vol:.11}); tone({f:900, f2:1900, dur:.24, vol:.07, delay:.05}); break; // 기: 상승 기류
    case 'crit':   tone({f:420, f2:70, type:'square', dur:.2, vol:.2}); noiseHit({dur:.24, cut:1500, vol:.28}); tone({f:1200, f2:2600, dur:.16, vol:.1, delay:.06}); break; // 크리티컬
    case 'guard':  tone({f:820, f2:520, type:'triangle', dur:.16, vol:.15}); tone({f:1650, dur:.09, vol:.05, delay:.02}); break; // 기막 방어
    case 'hurt':   tone({f:120, f2:42, type:'sawtooth', dur:.28, vol:.28}); noiseHit({dur:.2, cut:380, vol:.22}); break; // 피격
    case 'poison': tone({f:320, f2:150, type:'triangle', dur:.11, vol:.11}); tone({f:260, f2:120, type:'triangle', dur:.11, vol:.09, delay:.09}); break; // 중독
    case 'chain':  [523,659,784].forEach((f,i)=>tone({f, type:'triangle', dur:.15, vol:.13, delay:i*0.07})); break; // 연계기 차임
    case 'win':    [523,659,784,1046].forEach((f,i)=>tone({f, type:'triangle', dur:.3, vol:.14, delay:i*0.12})); break; // 승리
    case 'lose':   [392,300,220,130].forEach((f,i)=>tone({f, dur:.4, vol:.16, delay:i*0.16})); break; // 패배
    case 'gold':   tone({f:1320, type:'triangle', dur:.08, vol:.11}); tone({f:1680, type:'triangle', dur:.1, vol:.09, delay:.06}); break; // 골드/보상
  }
}
// 음소거 토글 (설정은 저장됨)
function toggleSfx(){
  sfxOn = !sfxOn;

/* ===== 전투 연출(FX) 헬퍼 ===== */
// 연출 전용 레이어 — render()가 #app을 다시 그려도 지워지지 않도록 body에 부착
const fxLayer = document.createElement('div');
fxLayer.id = 'fx';
document.body.appendChild(fxLayer);

// 연출 요소를 레이어에 넣고 일정 시간 후 제거
function fxAdd(el, ms){
  fxLayer.appendChild(el);
  setTimeout(()=>el.remove(), ms);
}
// 특정 요소의 화면 좌표 얻기 (연출 위치 기준점)
function rectOf(sel){
  const el = document.querySelector(sel);
  return el ? el.getBoundingClientRect() : null;
}
// 초식명 붓글씨 스플래시 (연계 발동 시 연계명도 함께)
function fxSplash(main, sub){
  const el = document.createElement('div');
  el.className = 'fx-splash';
  el.innerHTML = esc(main) + (sub ? `<div class="fx-splash-sub">연계 · ${esc(sub)}</div>` : '');
  fxAdd(el, 950);
}
// 떠오르는 숫자/텍스트
function fxFloat(x, y, text, color, size){
  const el = document.createElement('div');
  el.className = 'fx-float';
  el.style.cssText = `left:${x}px; top:${y}px; color:${color}; font-size:${size||28}px;`;
  el.textContent = text;
  fxAdd(el, 1050);
}
/* --- 문파별 타격 이펙트 --- */
const SUIT_FX = {geom:'#a8d0f0', jang:'#f09a88', gwon:'#f0c060', gi:'#8ae0bc'};
// 파편 폭발 — 사방으로 튀는 불꽃 입자
function fxBurst(x, y, color, n){
  for(let i=0; i<(n||14); i++){
    const el = document.createElement('div');
    el.className = 'fx-part';
    const ang = Math.random()*Math.PI*2;
    const dist = 45 + Math.random()*70;
    el.style.cssText = `left:${x}px; top:${y}px; background:${color};
      width:${5+Math.random()*6}px; height:${5+Math.random()*6}px;
      --dx:${Math.cos(ang)*dist}px; --dy:${Math.sin(ang)*dist}px;`;
    fxAdd(el, 650);
  }
}
// 파동 링 — 장풍/기공 확산
function fxRing(x, y, color, delay){
  setTimeout(()=>{
    const el = document.createElement('div');
    el.className = 'fx-ring';
    el.style.cssText = `left:${x}px; top:${y}px; border-color:${color};`;
    fxAdd(el, 600);
  }, delay||0);
}
// 참격 — 빛나는 검격 선 (각도 지정)
function fxSlashLine(x, y, color, deg, delay){
  setTimeout(()=>{
    const el = document.createElement('div');
    el.className = 'fx-slash';
    el.style.cssText = `left:${x-80}px; top:${y-80}px; --rot:${deg}deg; --slashc:${color};`;
    fxAdd(el, 440);
  }, delay||0);
}
// 문파별 종합 타격 연출: 검=삼연참 / 장=이중 파동 / 권=대폭발 / 기=기공 파문
function fxImpact(suit, x, y){
  const color = SUIT_FX[suit] || '#fff';
  if(suit==='geom'){
    fxSprite('fx_slash', 5, x, y, 130); // 픽셀 참격 (pimen VFX)
    fxSlashLine(x, y, color, -38, 0);
    fxSlashLine(x, y, color, 24, 110);
    fxBurst(x, y, color, 8);
  }else if(suit==='jang'){
    fxRing(x, y, color, 0);
    fxRing(x, y, color, 140);
    fxBurst(x, y, color, 8);
  }else if(suit==='gwon'){
    fxSprite('fx_hit', 7, x, y, 120); // 픽셀 타격 섬광 (pimen VFX)
    fxBurst(x, y, color, 14);
    fxRing(x, y, color, 60);
  }else{ // gi
    fxRing(x, y, color, 0);
    fxRing(x, y, color, 120);
    fxRing(x, y, color, 240);
  }
}

// 두 캐릭터 사이 거리 (돌진 이동량) — sel로 특정 적 지정 가능
function figDistance(sel){
  const p = rectOf('.player-face'), e = rectOf(sel || '.enemy-face');

  return Math.max(80, e.left - p.right + 30);

// 상대를 향해 돌진해서 멈춤 (타격 순간까지 유지)
function dashTo(sel, dx){

function dashBack(sel, dx){

// 주인공 스프라이트 동작 전환 (attack/hurtanim → 끝나면 idle 복귀)
function heroAnim(state, durMs){

  </div>`;
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov);
}

/* ===== 놀이법 가이드 ===== */
function showGuide(){

  ov.className = 'overlay';
  ov.innerHTML = `<div class="center-panel codex" style="max-width:680px;">
    <h2 style="font-size:22px;">놀이법 (入門 指南)</h2>

      <h3>⚔️ 전투 — 한 턴의 순서</h3>

      <p>2막부터는 적이 <b>2~3명</b>씩 몰려온다. <b>적을 눌러 목표(▼)를 지정</b>하고, "모든 적에게" 카드(횡소천군·선풍퇴·사자후)로 한꺼번에 쓸어버리자.</p>
      <h3>🛡️ 방어</h3>
      <p>방어·기술 카드로 <b style="color:var(--gi)">방어</b>를 쌓으면 적의 공격을 먼저 흡수한다. 단, <b>내 턴이 시작되면 방어는 사라진다</b> — 적의 예고 공격력을 보고 필요한 만큼만 쌓을 것.</p>
      <h3>☠️ 상태 이상</h3>

      <h3>🔗 연계 & 크리티컬</h3>

      <h3>🗺️ 지도</h3>

  </div>`;
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov);

// localStorage 안전 접근 (차단 환경 대비)
function storageGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function storageSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

/* ===== 게임 중 메뉴 (☰) ===== */
function showMenu(){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `<div class="center-panel" style="max-width:340px; gap:10px;">
    <h2 style="font-size:22px;">메뉴</h2>
    <button class="primary" style="font-size:16px;" onclick="this.closest('.overlay').remove()">▶️ 계속하기</button>
    <button onclick="this.closest('.overlay').remove(); showCodex();">📖 비전서 (카드·비급 도감)</button>
    <button onclick="this.closest('.overlay').remove(); showGuide();">❓ 놀이법</button>
    <button onclick="toggleSfxInMenu(this)">${sfxOn?'🔊 효과음 켜짐':'🔇 효과음 꺼짐'}</button>
    <button style="color:#e06050; border-color:#6a3a32;" onclick="exitToTitle()">🚪 타이틀로 나가기</button>
    <div class="dim" style="font-size:12px; line-height:1.7;">진행은 층 단위로 자동 저장됩니다.<br>전투 도중에 나가면 이번 층은 처음부터 다시 싸웁니다.</div>
  </div>`;
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov);
}
// 메뉴 안에서 효과음 토글 (버튼 문구만 갱신, 화면 재렌더 없이)
function toggleSfxInMenu(btn){
  sfxOn = !sfxOn;
  storageSet('hg_sfx', sfxOn ? 'on' : 'off');
  if(sfxOn) sfx('gold');
  btn.textContent = sfxOn ? '🔊 효과음 켜짐' : '🔇 효과음 꺼짐';
}
// 타이틀 화면으로 (마지막 층 경계 저장은 유지됨)
function exitToTitle(){
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
  G = null;
  render();
}

/* ===== 자동 저장 / 이어하기 =====
   층을 넘어갈 때마다 진행 상황을 브라우저에 저장한다.
   전투·보상 도중에 껐다면 이어하기 시 그 층부터 다시 시작 (저장 상태는 항상 층 경계) */
function saveGame(){
  if(!G || !G.deck || !G.char) return;
  const snap = {
    char:G.char.id, hp:G.hp, maxHp:G.maxHp, gold:G.gold,
    relics:G.relics, deck:G.deck, nextCardId:G.nextCardId,
    act:G.act, floor:G.floor, floors:G.floors,
    savedAt:Date.now(),
  };
  storageSet('hg_save', JSON.stringify(snap));
}
function readSave(){
  try{
    const s = JSON.parse(storageGet('hg_save') || 'null');
    if(s && s.char && Array.isArray(s.deck) && CHARACTERS.some(c=>c.id===s.char)) return s;
  }catch(e){}
  return null;
}
function clearSave(){ storageSet('hg_save',''); }
// 이어하기 — 저장된 층의 지도에서 재개
function loadGame(){
  const s = readSave();
  if(!s){ G=null; render(); return; }
  const ch = CHARACTERS.find(c=>c.id===s.char);
  G = {
    char:ch, hp:s.hp, maxHp:s.maxHp, gold:s.gold,
    relics:s.relics, deck:s.deck, nextCardId:s.nextCardId,
    act:s.act, floor:s.floor, floors:s.floors,
    combat:null, screen:'map',
  };
  sfx('gold');
  render();
}

/* ===== 시작 ===== */
render();
</script>
